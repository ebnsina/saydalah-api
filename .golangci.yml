run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - nakedret

linters-settings:
  goimports:
    local-prefixes: github.com/ebnsina/saydalah-api
  misspell:
    locale: US

issues:
  exclude-rules:
    # Generated sqlc code is not ours to lint.
    - path: internal/store/.*\.sql\.go
      linters: [unused, staticcheck, errcheck]
  max-issues-per-linter: 0
  max-same-issues: 0
