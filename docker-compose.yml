services:
  db:
    image: postgres:17-alpine
    container_name: saydalah-db
    environment:
      POSTGRES_USER: saydalah
      POSTGRES_PASSWORD: saydalah
      POSTGRES_DB: saydalah
    ports:
      - "5432:5432"
    volumes:
      - saydalah_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saydalah"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  saydalah_pgdata:
