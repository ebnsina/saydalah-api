services:
  db:
    image: postgres:17-alpine
    container_name: saydalah-db
    environment:
      POSTGRES_USER: saydalah
      POSTGRES_PASSWORD: saydalah
      POSTGRES_DB: saydalah
    ports:
      - "5432:5432"
    volumes:
      - saydalah_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saydalah"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The API. Started under the "app" profile so plain `docker compose up -d db`
  # (local dev against `go run`) stays unaffected:
  #   docker compose --profile app up -d --build
  api:
    build: .
    container_name: saydalah-api
    profiles: ["app"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: ":8080"
      # Connects to the db service over the compose network (not host :5432).
      DATABASE_URL: postgres://saydalah:saydalah@db:5432/saydalah?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  saydalah_pgdata:
